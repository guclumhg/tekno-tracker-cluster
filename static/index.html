<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tekno Tracker Cluster</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/app.js"></script>
    <script src="/static/alpine.min.js" defer></script>
</head>
<body>

<div id="app" x-data="trackerCluster()">

    <header class="header">
        <h1>TEKNO TRACKER CLUSTER</h1>
        <div class="header-right">
            <a href="/static/kilavuz.html" target="_blank" style="color:#fff;text-decoration:none;font-size:11px;opacity:0.7" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.7'">Kilavuz</a>
            <span x-text="'PlantManager: ' + getStats().pmsOnline + '/' + getStats().pmsTotal"></span>
            <span x-show="lastPoll" x-text="'Son Guncelleme: ' + lastPoll" style="color:#666"></span>
        </div>
    </header>

    <nav class="tabs">
        <template x-for="tab in tabs" :key="tab.id">
            <button class="tab-btn"
                    :class="{ active: currentTab === tab.id }"
                    @click="currentTab = tab.id"
                    x-text="tab.label">
            </button>
        </template>
    </nav>

    <main class="content">

        <!-- ============================================================ -->
        <!-- MOD HARITASI                                                  -->
        <!-- ============================================================ -->
        <div x-show="currentTab === 'modes'">
            <div class="toolbar">
                <button class="btn btn-blue btn-sm" @click="loadCluster()" :disabled="loading">YENILE</button>
                <label class="toggle-label">
                    <input type="checkbox" x-model="autoRefresh" @change="toggleAutoRefresh()">
                    Otomatik
                </label>
                <span class="refresh-info" x-show="loading">Yukleniyor...</span>
            </div>

            <!-- Bulk control -->
            <div class="form-box" style="margin-bottom:8px">
                <div class="form-row" style="margin-bottom:4px">
                    <span style="font-size:10px;color:#888;min-width:50px">Santral:</span>
                    <button class="btn btn-sm" :class="bulkAllSelected() ? 'btn-blue' : 'btn-mode-off'"
                            @click="bulkSelectAll()" style="font-size:9px;padding:2px 6px">TUMU</button>
                    <template x-for="(pm, wi) in cluster" :key="'bs'+wi">
                        <button class="btn btn-sm"
                                :class="bulk.selectedPMs[wi] ? 'btn-blue' : 'btn-mode-off'"
                                @click="bulkTogglePM(wi)"
                                style="font-size:9px;padding:2px 5px"
                                x-text="wi+1"></button>
                    </template>
                </div>
                <div class="form-row">
                    <span style="font-size:10px;color:#888;min-width:50px">Mod:</span>
                    <template x-for="m in bulkModes" :key="'bm'+m.value">
                        <button class="btn btn-sm"
                                :style="'background:' + (bulk.selectedMode === m.value ? m.color : '#444') + ';color:' + (bulk.selectedMode === m.value ? (m.value === 8 ? '#000' : '#fff') : '#888')"
                                @click="bulkSelectMode(m.value)"
                                style="font-size:9px;padding:2px 6px"
                                x-text="m.label"></button>
                    </template>
                    <button class="btn btn-green btn-sm"
                            :disabled="bulk.selectedMode === null || bulk.busy"
                            @click="bulkApplyMode()"
                            style="font-size:10px;padding:3px 10px">GUNCELLE</button>
                    <span class="refresh-info" x-show="bulk.msg" x-text="bulk.msg"
                          :style="'color:' + (bulk.busy ? '#FF9800' : '#4CAF50') + ';font-weight:bold'"></span>
                </div>
            </div>

            <div class="legend">
                <template x-for="ms in getStats().modeCounts" :key="'lg'+ms.label">
                    <span class="legend-item">
                        <span class="legend-dot" :style="'background:' + ms.color"></span>
                        <span :style="'color:' + ms.color" x-text="ms.label + ':' + ms.count"></span>
                    </span>
                </template>
            </div>

            <template x-for="(pmRow, ri) in getPMRows()" :key="'wr'+ri">
                <div class="block-row">
                    <template x-for="(pm, wi) in pmRow" :key="'bw'+ri+'_'+wi">
                        <div class="block">
                            <a class="block-label" :href="'http://' + pm.ip + ':8090/'" target="_blank" x-text="pm.name" :style="'color:' + (pm.online ? '#4FC3F7' : '#555') + ';text-decoration:none'" @mouseenter="$el.style.textDecoration='underline'" @mouseleave="$el.style.textDecoration='none'"></a>
                            <div class="pixel-grid" :style="'grid-template-columns:repeat(' + pmMaxDevices(pm) + ',1fr)'">
                                <template x-for="row in pmOmegaCount(pm)" :key="'pr'+ri+'_'+wi+'_'+row">
                                    <template x-for="col in pmMaxDevices(pm)" :key="'pc'+ri+'_'+wi+'_'+row+'_'+col">
                                        <div class="pixel"
                                             :style="'background:' + getPixelColor(pm, reverseRow(row,pm)-1, col-1)"
                                             :title="getTooltip(pm, reverseRow(row,pm)-1, col)">
                                        </div>
                                    </template>
                                </template>
                            </div>
                        </div>
                    </template>
                </div>
            </template>
        </div>

        <!-- ============================================================ -->
        <!-- ACI HARITASI                                                  -->
        <!-- ============================================================ -->
        <div x-show="currentTab === 'angles'">
            <div class="toolbar">
                <button class="btn btn-blue btn-sm" @click="loadCluster()" :disabled="loading">YENILE</button>
                <label class="toggle-label">
                    <input type="checkbox" x-model="autoRefresh" @change="toggleAutoRefresh()">
                    Otomatik
                </label>
                <span class="refresh-info" x-show="loading">Yukleniyor...</span>
            </div>

            <!-- Bulk angle control -->
            <div class="form-box" style="margin-bottom:8px">
                <div class="form-row" style="margin-bottom:4px">
                    <span style="font-size:10px;color:#888;min-width:50px">Santral:</span>
                    <button class="btn btn-sm" :class="bulkAngleAllSelected() ? 'btn-blue' : 'btn-mode-off'"
                            @click="bulkAngleSelectAll()" style="font-size:9px;padding:2px 6px">TUMU</button>
                    <template x-for="(pm, wi) in cluster" :key="'as'+wi">
                        <button class="btn btn-sm"
                                :class="bulkAngle.selectedPMs[wi] ? 'btn-blue' : 'btn-mode-off'"
                                @click="bulkAngleTogglePM(wi)"
                                style="font-size:9px;padding:2px 5px"
                                x-text="wi+1"></button>
                    </template>
                </div>
                <div class="form-row">
                    <span style="font-size:10px;color:#888;min-width:50px">Aci:</span>
                    <input type="number" x-model="bulkAngle.angle" min="-60" max="60" step="1" placeholder="derece" style="width:70px;font-size:11px">
                    <span style="font-size:9px;color:#666">(-60 ~ +60)</span>
                    <button class="btn btn-green btn-sm"
                            :disabled="!bulkAngle.angle || bulkAngle.busy"
                            @click="bulkApplyAngle()"
                            style="font-size:10px;padding:3px 10px">GUNCELLE</button>
                    <span class="refresh-info" x-show="bulkAngle.msg" x-text="bulkAngle.msg"
                          :style="'color:' + (bulkAngle.busy ? '#FF9800' : '#4CAF50') + ';font-weight:bold'"></span>
                </div>
            </div>

            <template x-for="(pmRow, ri) in getPMRows()" :key="'ar'+ri">
                <div class="block-row">
                    <template x-for="(pm, wi) in pmRow" :key="'ab'+ri+'_'+wi">
                        <div class="block">
                            <a class="block-label" :href="'http://' + pm.ip + ':8090/'" target="_blank" x-text="pm.name" :style="'color:' + (pm.online ? '#4FC3F7' : '#555') + ';text-decoration:none'" @mouseenter="$el.style.textDecoration='underline'" @mouseleave="$el.style.textDecoration='none'"></a>
                            <div class="angle-grid" :style="'grid-template-columns:repeat(' + pmMaxDevices(pm) + ',1fr)'">
                                <template x-for="row in pmOmegaCount(pm)" :key="'aer'+ri+'_'+wi+'_'+row">
                                    <template x-for="col in pmMaxDevices(pm)" :key="'aec'+ri+'_'+wi+'_'+row+'_'+col">
                                        <div class="angle-cell"
                                             :class="getAngleText(pm, reverseRow(row,pm)-1, col-1) ? '' : 'angle-empty'"
                                             :title="getTooltip(pm, reverseRow(row,pm)-1, col)"
                                             x-text="getAngleText(pm, reverseRow(row,pm)-1, col-1) || ''">
                                        </div>
                                    </template>
                                </template>
                            </div>
                        </div>
                    </template>
                </div>
            </template>
        </div>

        <!-- ============================================================ -->
        <!-- ZAMAN HARITASI                                                -->
        <!-- ============================================================ -->
        <div x-show="currentTab === 'time'">
            <div class="toolbar">
                <button class="btn btn-blue btn-sm" @click="loadCluster()" :disabled="loading">YENILE</button>
                <label class="toggle-label">
                    <input type="checkbox" x-model="autoRefresh" @change="toggleAutoRefresh()">
                    Otomatik
                </label>
                <span class="refresh-info" x-show="loading">Yukleniyor...</span>
            </div>

            <!-- Bulk time control -->
            <div class="form-box" style="margin-bottom:8px">
                <div class="form-row" style="margin-bottom:4px">
                    <span style="font-size:10px;color:#888;min-width:50px">Santral:</span>
                    <button class="btn btn-sm" :class="bulkTimeAllSelected() ? 'btn-blue' : 'btn-mode-off'"
                            @click="bulkTimeSelectAll()" style="font-size:9px;padding:2px 6px">TUMU</button>
                    <template x-for="(pm, wi) in cluster" :key="'ts'+wi">
                        <button class="btn btn-sm"
                                :class="bulkTime.selectedPMs[wi] ? 'btn-blue' : 'btn-mode-off'"
                                @click="bulkTimeTogglePM(wi)"
                                style="font-size:9px;padding:2px 5px"
                                x-text="wi+1"></button>
                    </template>
                </div>
                <div class="form-row">
                    <button class="btn btn-green btn-sm"
                            :disabled="bulkTime.busy"
                            @click="bulkApplyTimeBrowser()"
                            style="font-size:10px;padding:3px 10px">BROWSER SAATI YAZ</button>
                    <span style="font-size:10px;color:#666" x-text="'Browser: ' + bulkTimeBrowserNow()"></span>
                    <span style="color:#555">|</span>
                    <input type="date" x-model="bulkTime.manualDate" style="width:110px;font-size:10px">
                    <input type="time" x-model="bulkTime.manualTime" step="1" style="width:75px;font-size:10px">
                    <button class="btn btn-green btn-sm"
                            :disabled="!bulkTime.manualDate || !bulkTime.manualTime || bulkTime.busy"
                            @click="bulkApplyTimeManual()"
                            style="font-size:10px;padding:3px 10px">MANUAL YAZ</button>
                    <span class="refresh-info" x-show="bulkTime.msg" x-text="bulkTime.msg"
                          :style="'color:' + (bulkTime.busy ? '#FF9800' : '#4CAF50') + ';font-weight:bold'"></span>
                </div>
            </div>

            <template x-for="(pmRow, ri) in getPMRows()" :key="'tr'+ri">
                <div class="block-row">
                    <template x-for="(pm, wi) in pmRow" :key="'tb'+ri+'_'+wi">
                        <div class="block">
                            <a class="block-label" :href="'http://' + pm.ip + ':8090/'" target="_blank" x-text="pm.name" :style="'color:' + (pm.online ? '#4FC3F7' : '#555') + ';text-decoration:none'" @mouseenter="$el.style.textDecoration='underline'" @mouseleave="$el.style.textDecoration='none'"></a>
                            <div class="time-grid" :style="'grid-template-columns:repeat(' + pmMaxDevices(pm) + ',1fr)'">
                                <template x-for="row in pmOmegaCount(pm)" :key="'ter'+ri+'_'+wi+'_'+row">
                                    <template x-for="col in pmMaxDevices(pm)" :key="'tec'+ri+'_'+wi+'_'+row+'_'+col">
                                        <div class="time-cell"
                                             :class="getTimeText(pm, reverseRow(row,pm)-1, col-1) ? '' : 'time-empty'"
                                             :title="getTooltip(pm, reverseRow(row,pm)-1, col)"
                                             x-text="getTimeText(pm, reverseRow(row,pm)-1, col-1) || ''">
                                        </div>
                                    </template>
                                </template>
                            </div>
                        </div>
                    </template>
                </div>
            </template>
        </div>

        <!-- ============================================================ -->
        <!-- AYARLAR                                                       -->
        <!-- ============================================================ -->
        <div x-show="currentTab === 'settings'">
            <div class="form-box">
                <div class="form-title">Cluster Ayarlari</div>
                <div class="form-row">
                    <label>Poll Aralik (sn):</label>
                    <input type="number" x-model.number="settings.poll_interval" min="5" max="3600" style="width:60px">
                    <button class="btn btn-orange btn-sm" @click="saveSettings()" :disabled="settings.saving">KAYDET</button>
                    <span class="refresh-info" x-text="settings.msg"></span>
                </div>
            </div>

        </div>

    </main>
</div>

<footer style="text-align:center;padding:12px;font-size:10px;color:#666;border-top:1px solid #333;margin-top:20px">
    Designed and Written by Muhammed Hasan GUCLU - 2026
</footer>
</body>
</html>
